[package]
name = "ws"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
axum = "0.8.9"
serde_json = "1.0.149"
sqlx = { version = "0.8.6", features = ["postgres", "runtime-tokio-rustls"] }
tokio = { version = "1.52.1", features = ["rt-multi-thread"] }
tower-http = { version = "0.6.8", features = ["trace"] }
tracing = "0.1.44"
tracing-subscriber = "0.3.23"

[dev-dependencies]
reqwest = { version = "0.13.3", features = ["json", "rustls"]}
uuid = { version = "1.23.1", features = ["v4"] }

# [profile.release]
# opt-level = 3
# strip = true
# lto = true
