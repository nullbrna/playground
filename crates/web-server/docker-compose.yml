services:
    database:
        image: postgres:14-alpine
        ports:
            - 5432:5432
        environment:
            - POSTGRES_USER=admin
            - POSTGRES_PASSWORD=password
            - POSTGRES_DB=playground

    redis:
        image: redis:7-alpine
        ports:
            - 6379:6379

    server:
        depends_on:
            - database
            - redis
        build:
            context: .
        ports:
            - 8080:8080
        environment:
            - DATABASE_URL=postgres://admin:password@database:5432/playground
            - REDIS_URL=redis://redis:6379
        volumes:
            # Mount source files for hot-reloading.
            - ./src:/app/src
            # Tests seed their unique SQL schema with migrations. The scripts
            # are needed when running tests within the container.
            - ./migrations:/app/migrations
