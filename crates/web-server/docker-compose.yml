services:
    database:
        image: postgres:14-alpine
        ports:
            - 5432:5432
        environment:
            - POSTGRES_USER=admin
            - POSTGRES_PASSWORD=password
            - POSTGRES_DB=playground
        volumes:
            # Script to run when DB is ready & open for connection. Only runs
            # when the top-level volume is empty.
            - ./setup/seed.sql:/docker-entrypoint-initdb.d/init_seed.sql

    redis:
        image: redis:7-alpine
        ports:
            - 6379:6379

    server:
        depends_on:
            - database
            - redis
        build:
            context: .
        ports:
            - 8080:8080
        environment:
            - DATABASE_URL=postgres://admin:password@database:5432/playground
            - REDIS_URL=redis://redis:6379
        volumes:
            # Mount source files for hot-reloading.
            - ./src:/app/src
